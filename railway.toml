[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[nixpacks]
# Only install Node.js — Python data pipeline runs locally, not on Railway
pkgs = ["nodejs_20"]
